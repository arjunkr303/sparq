<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — StrangerNear</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--bg3:#141426;--sr:#1a1a2e;--bd:rgba(120,100,255,.15);--pr:#7c5cfc;--pr2:#9b7ffe;--pg:rgba(124,92,252,.35);--rd:#ef4565;--gn:#06d6a0;--tx:#f0eeff;--t2:#a89fd8;--t3:#6b638f}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
h1{font-family:'Syne',sans-serif;font-weight:800}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;transition:all .25s}
a{text-decoration:none}
.card{width:100%;max-width:420px;background:var(--sr);border:1px solid var(--bd);border-radius:22px;padding:36px;animation:fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.top{text-align:center;margin-bottom:24px}
.icon{font-size:30px;color:var(--pr);display:block;margin-bottom:10px}
.top h1{font-size:22px;margin-bottom:4px}
.top p{color:var(--t2);font-size:13px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
label{font-size:12px;font-weight:600;color:var(--t2)}
.iw{position:relative}
.iw input{width:100%;padding:10px 40px 10px 13px;background:var(--bg3);border:1px solid var(--bd);color:var(--tx);border-radius:9px;font-size:13px;transition:border .2s;font-family:'DM Sans',sans-serif}
.iw input:focus{outline:none;border-color:var(--pr)}
.iw input::placeholder{color:var(--t3)}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;line-height:1}
.eye:hover{color:var(--pr2)}
.btnp{width:100%;background:linear-gradient(135deg,var(--pr),var(--pr2));color:#fff;padding:11px;border-radius:50px;font-weight:600;font-size:13px;box-shadow:0 4px 20px var(--pg);margin-top:4px}
.btnp:hover{transform:translateY(-2px)}.btnp:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btns{width:100%;background:transparent;border:1px solid var(--bd);color:var(--t2);padding:10px;border-radius:50px;font-size:13px;font-weight:500;margin-top:8px}
.btns:hover{border-color:var(--pr);color:var(--pr2)}
.err{background:rgba(239,69,101,.1);border:1px solid rgba(239,69,101,.3);color:var(--rd);border-radius:9px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}
.ok{background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.25);color:var(--gn);border-radius:9px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.divider span{color:var(--t3);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.ft{text-align:center;margin-top:16px;color:var(--t2);font-size:13px}
.ft a{color:var(--pr2);font-weight:600}
.bl{display:inline-block;margin-bottom:12px;color:var(--t2);font-size:13px}


</style>
</head>
<body>
<div class="card">
  <a href="index.html" class="bl">← Back</a>
  <div class="top">
    <span class="icon">◈</span>
    <h1>Welcome back</h1>
    <p>Sign in to continue chatting</p>
  </div>

  <div class="err" id="err"></div>
  <div class="ok"  id="ok"></div>

  <!-- Login panel -->
  <div id="loginPanel">
    <div class="field">
      <label>Email</label>
      <div class="iw"><input type="email" id="email" placeholder="you@example.com"/></div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="iw">
        <input type="password" id="pass" placeholder="••••••••"/>
        <button class="eye" id="eye1" onclick="tog('pass','eye1')">👁</button>
      </div>
    </div>
    <button class="btnp" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="divider"><span>or</span></div>
    <button class="btns" onclick="guestChat()">Continue as Guest →</button>
  </div>



  <p class="ft">No account? <a href="register.html">Sign up free</a></p>
</div>

<script>
const API = 'http://127.0.0.1:5000';

const $ = id => document.getElementById(id);

function tog(id, bid) {
  const i=$(id), b=$(bid);
  i.type = i.type==='password'?'text':'password';
  b.textContent = i.type==='password'?'👁':'🙈';
}

function showErr(m) {
  $('ok').style.display  = 'none';
  $('err').textContent   = m;
  $('err').style.display = 'block';
  $('loginBtn').disabled    = false;
  $('loginBtn').textContent = 'Sign In →';
}
function showOk(m) {
  $('err').style.display = 'none';
  $('ok').textContent    = m;
  $('ok').style.display  = 'block';
}
function hideMsg() {
  $('err').style.display = $('ok').style.display = 'none';
}

async function doLogin() {
  const email = $('email').value.trim();
  const pass  = $('pass').value;
  hideMsg();
  if (!email || !pass) return showErr('Please fill in all fields');
  $('loginBtn').disabled = true;
  $('loginBtn').textContent = 'Signing in...';
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (!r.ok) return showErr(d.message || 'Login failed');

    saveAndGo(d);
  } catch (e) {
    console.error(e);
    showErr('Cannot connect. Make sure backend is running on port 5000.');
  } finally {
    $('loginBtn').disabled    = false;
    $('loginBtn').textContent = 'Sign In →';
  }
}



function saveAndGo(d) {
  localStorage.setItem('sc_token', d.token);
  localStorage.setItem('sc_user',  JSON.stringify(d.user));
  // Verify it saved correctly before redirecting
  const saved = localStorage.getItem('sc_token');
  if (!saved) { showErr('Could not save session. Check browser localStorage is enabled.'); return; }
  console.log('✅ Session saved. Redirecting...');
  location.href = 'dashboard.html';
}

function guestChat() {
  localStorage.removeItem('sc_token');
  localStorage.removeItem('sc_user');
  localStorage.setItem('sc_guest', 'true');
  location.href = 'chat.html';
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  doLogin();
});

// Already logged in? Go to dashboard
const tok = localStorage.getItem('sc_token');
if (tok) {
  console.log('Token found, redirecting to dashboard...');
  location.href = 'dashboard.html';
}
</script>
</body>
</html>
