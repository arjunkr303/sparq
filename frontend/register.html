<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Create Account — Sparq</title>
<meta name="description" content="Join Sparq for free. Meet real people from your city, state, or anywhere in the world. Create your account in minutes."/>



<style>
@font-face {
  font-family: 'League Spartan';
  src: url('./fonts/variable/WOFF2/LeagueSpartan-VF.woff2') format('woff2');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  --bg:          #060610;
  --bg-2:        #0b0b1e;
  --bg-3:        #12122a;
  --surface:     rgba(255,255,255,0.04);
  --surface-2:   rgba(255,255,255,0.07);
  --glass:       rgba(10,9,30,0.75);
  --border:      rgba(139,117,255,0.16);
  --border-2:    rgba(139,117,255,0.30);
  --border-glow: rgba(139,117,255,0.60);

  --violet:      #7c5cfc;
  --violet-2:    #9b7ffe;
  --violet-3:    #b89fff;
  --cyan:        #22d3ee;
  --rose:        #f472b6;
  --gold:        #fbbf24;
  --green:       #34d399;
  --red:         #ef4444;

  --glow-v:      rgba(124,92,252,0.45);
  --glow-c:      rgba(34,211,238,0.25);

  --text:        #f0edff;
  --text-2:      #a99fd4;
  --text-3:      #6b6390;

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
  --r-xl: 32px;
  --r-pill: 999px;

  --t: 0.25s cubic-bezier(0.4,0,0.2,1);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'League Spartan', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 16px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  font-weight: 400;
}
h1,h2,h3,h4 { font-family:'League Spartan',sans-serif; font-weight: 700; line-height:1.15; }
a { text-decoration:none; color:inherit; }
button { font-family:'League Spartan',sans-serif; cursor:pointer; border:none; outline:none; }
input, select { font-family:'League Spartan',sans-serif; }

/* ── NOISE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── CANVAS ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── BG BLOBS ── */
.bg-blob {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(80px);
  z-index: 0;
}
.bg-blob-1 {
  width: 600px; height: 600px;
  background: radial-gradient(ellipse, rgba(124,92,252,0.12) 0%, transparent 70%);
  top: -200px; left: -100px;
}
.bg-blob-2 {
  width: 500px; height: 500px;
  background: radial-gradient(ellipse, rgba(34,211,238,0.08) 0%, transparent 70%);
  bottom: -150px; right: -100px;
}

/* ═══════════════════════════════════════════════
   CARD / LAYOUT
═══════════════════════════════════════════════ */
.card-wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 520px;
  animation: fade-in 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes fade-in {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Glow border wrapper */
.card-glow {
  position: relative;
  border-radius: var(--r-xl);
  padding: 1px;
  background: linear-gradient(135deg, rgba(124,92,252,0.4), rgba(34,211,238,0.15), rgba(124,92,252,0.1));
  box-shadow: 0 0 60px rgba(124,92,252,0.15), 0 24px 80px rgba(0,0,0,0.5);
}

.card {
  background: var(--glass);
  backdrop-filter: blur(28px) saturate(180%);
  border-radius: calc(var(--r-xl) - 1px);
  padding: 40px 36px;
}

/* ── BACK LINK ── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-3);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 28px;
  transition: var(--t);
  padding: 6px 0;
}
.back-link:hover { color: var(--violet-2); }
.back-link svg { transition: transform var(--t); }
.back-link:hover svg { transform: translateX(-3px); }

/* ── HEADER ── */
.card-header { text-align: center; margin-bottom: 28px; }

.logo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--violet), var(--cyan));
  border-radius: 16px;
  font-size: 24px;
  margin-bottom: 16px;
  box-shadow: 0 0 24px var(--glow-v);
  animation: logo-pulse 3s ease-in-out infinite;
}
@keyframes logo-pulse {
  0%,100% { box-shadow: 0 0 24px var(--glow-v); }
  50%      { box-shadow: 0 0 44px var(--glow-v), 0 0 80px rgba(34,211,238,0.2); }
}

.card-header h1 {
  font-size: 26px;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #fff, var(--violet-3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.card-header p {
  color: var(--text-3);
  font-size: 14px;
  font-weight: 400;
}

/* ── PROGRESS BAR ── */
.progress-wrap { margin-bottom: 28px; }
.progress-track {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.progress-dot {
  flex: 1;
  height: 3px;
  border-radius: var(--r-pill);
  background: rgba(139,117,255,0.15);
  transition: background 0.4s;
}
.progress-dot.active { background: var(--violet); }
.progress-dot.done {
  background: linear-gradient(90deg, var(--violet), var(--cyan));
}
.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.progress-labels span.active { color: var(--violet-2); }

/* ── ERROR BOX ── */
.err-box {
  display: none;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: var(--r-md);
  padding: 11px 16px;
  font-size: 13px;
  color: #f87171;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.err-box[hidden] { display: none !important; }

/* ── STEP ── */
.step { display: none; }
.step.active { display: block; animation: step-in 0.3s ease both; }
@keyframes step-in {
  from { opacity:0; transform:translateX(12px); }
  to   { opacity:1; transform:translateX(0); }
}

.step-label {
  font-family: 'League Spartan', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-2);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.step-label::before {
  content: '';
  display: inline-block;
  width: 4px; height: 18px;
  border-radius: var(--r-pill);
  background: linear-gradient(180deg, var(--violet), var(--cyan));
  flex-shrink: 0;
}

/* ── FIELD ── */
.field { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  margin-bottom: 7px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── INPUT WRAPPER ── */
.iw { position: relative; }
.iw input {
  width: 100%;
  padding: 12px 44px 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--r-md);
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.iw input:focus {
  outline: none;
  border-color: var(--violet);
  background: rgba(124,92,252,0.04);
  box-shadow: 0 0 0 3px rgba(124,92,252,0.12);
}
.iw input::placeholder { color: var(--text-3); }

.eye-btn {
  position: absolute;
  right: 13px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-3); cursor: pointer;
  font-size: 14px; line-height: 1;
  padding: 4px;
  transition: color var(--t);
}
.eye-btn:hover { color: var(--violet-2); }

/* Generic input (non-.iw) */
input[type="number"], input[type="text"]:not(.iw input), select {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--r-md);
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
input[type="number"]:focus, select:focus {
  outline: none;
  border-color: var(--violet);
  background: rgba(124,92,252,0.04);
  box-shadow: 0 0 0 3px rgba(124,92,252,0.12);
}
input::placeholder { color: var(--text-3); }
select option { background: #0f0f24; color: var(--text); }
select:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── HINT ── */
.hint {
  font-size: 11.5px;
  min-height: 16px;
  margin-top: 5px;
  font-weight: 500;
}
.hint.ok  { color: var(--green); }
.hint.err { color: var(--red); }
.hint.inf { color: var(--text-3); }

/* ── USERNAME ROW ── */
.urow { display: flex; gap: 8px; align-items: flex-start; }
.urow > div { flex: 1; }
.dice-btn {
  padding: 12px 13px;
  border-radius: var(--r-md);
  background: rgba(124,92,252,0.10);
  border: 1px solid var(--border-2);
  color: var(--violet-2);
  font-size: 17px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  margin-top: 0;
}
.dice-btn:hover { background: rgba(124,92,252,0.22); transform: rotate(20deg); }

/* ── GENDER BUTTONS ── */
.gender-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
.gender-btn {
  padding: 12px 8px;
  border-radius: var(--r-md);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.gender-btn .g-icon { font-size: 20px; }
.gender-btn:hover { border-color: var(--border-2); background: rgba(255,255,255,0.06); color: var(--text); }
.gender-btn.selected {
  background: rgba(124,92,252,0.12);
  border-color: var(--violet);
  color: var(--violet-2);
  box-shadow: 0 0 16px rgba(124,92,252,0.2);
}

/* ── INTEREST TAGS ── */
.int-section { margin-bottom: 12px; }
.int-cat-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 5px 12px;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.tag:hover { border-color: var(--border-2); color: var(--text); }
.tag.selected {
  background: rgba(124,92,252,0.12);
  border-color: var(--violet);
  color: var(--violet-2);
}
.int-count-badge {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  margin-left: 6px;
}

/* ── CHECKBOX ── */
.ck-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
}
.ck-row input[type=checkbox] {
  width: 16px; height: 16px;
  flex-shrink: 0;
  margin-top: 2px;
  accent-color: var(--violet);
  cursor: pointer;
}
.ck-row a { color: var(--violet-2); font-weight: 600; }
.ck-row a:hover { color: var(--violet-3); }

/* ── BUTTONS ── */
.btn-primary {
  width: 100%;
  padding: 13px;
  border-radius: var(--r-pill);
  background: linear-gradient(135deg, var(--violet), #5e3de8);
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.02em;
  box-shadow: 0 0 28px var(--glow-v), 0 4px 16px rgba(0,0,0,0.3);
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  margin-top: 6px;
}
.btn-primary::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.14), transparent);
  opacity: 0; transition: opacity 0.25s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 44px var(--glow-v), 0 8px 28px rgba(0,0,0,0.4); }
.btn-primary:hover::after { opacity: 1; }
.btn-primary:active { transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-secondary {
  flex: 1;
  padding: 12px;
  border-radius: var(--r-pill);
  background: transparent;
  border: 1px solid var(--border-2);
  color: var(--text-2);
  font-weight: 600;
  font-size: 14px;
  transition: all 0.25s;
  margin-top: 6px;
}
.btn-secondary:hover { border-color: var(--violet); color: var(--violet-2); background: rgba(124,92,252,0.06); }

.btn-row { display: flex; gap: 10px; }
.btn-row .btn-primary { flex: 2; }

/* ── FOOTER TEXT ── */
.footer-text {
  text-align: center;
  margin-top: 20px;
  color: var(--text-3);
  font-size: 13.5px;
}
.footer-text a { color: var(--violet-2); font-weight: 600; transition: color var(--t); }
.footer-text a:hover { color: var(--violet-3); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--violet); }

/* ── RESPONSIVE ── */
@media (max-width: 560px) {
  .card { padding: 28px 20px; }
  .gender-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- BG Elements -->
<canvas id="bg-canvas"></canvas>
<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>

<div class="card-wrap">
  <a href="index.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back to home
  </a>

  <div class="card-glow">
    <div class="card">

      <!-- Header -->
      <div class="card-header">
        <div class="logo-icon">◈</div>
        <h1>Create Account</h1>
        <p>Join Sparq free — takes 2 minutes</p>
      </div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-dot active" id="pd1"></div>
          <div class="progress-dot" id="pd2"></div>
          <div class="progress-dot" id="pd3"></div>
        </div>
        <div class="progress-labels">
          <span id="pl1" class="active">Account</span>
          <span id="pl2">Profile</span>
          <span id="pl3">Interests</span>
        </div>
      </div>

      <!-- Error Box -->
      <div class="err-box" id="errBox" hidden>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <circle cx="8" cy="8" r="7" stroke="#f87171" stroke-width="1.4"/>
          <path d="M8 5v3.5M8 10.5v.5" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="errText"></span>
      </div>

      <!-- ─── STEP 1: Account Info ─── -->
      <div class="step active" id="s1">
        <div class="step-label">Account Info</div>

        <div class="field">
          <label class="field-label" for="email">Email Address</label>
          <div class="urow">
            <div style="flex: 1;">
              <div class="iw">
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" oninput="chkEmail()"/>
              </div>
              <div class="hint" id="emailHint"></div>
            </div>
            <button id="btnVerifyEmail" class="dice-btn" style="font-size: 13px; font-weight: 600; font-family: 'League Spartan', sans-serif;" disabled onclick="requestVerificationLink(event)">Verify</button>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="uname">Username</label>
          <div class="urow">
            <div>
              <div class="iw">
                <input type="text" id="uname" placeholder="coolstranger99" maxlength="20" autocomplete="username" oninput="chkUname()"/>
              </div>
              <div class="hint" id="unameHint"></div>
            </div>
            <button class="dice-btn" title="Generate random username" onclick="randUname()">🎲</button>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="pass">Password</label>
          <div class="iw">
            <input type="password" id="pass" placeholder="Min 6 characters" autocomplete="new-password" oninput="chkPass()"/>
            <button class="eye-btn" id="eye1" onclick="togEye('pass','eye1')">👁</button>
          </div>
          <div class="hint" id="passHint"></div>
        </div>

        <div class="field">
          <label class="field-label" for="pass2">Confirm Password</label>
          <div class="iw">
            <input type="password" id="pass2" placeholder="Re-enter password" autocomplete="new-password" oninput="chkPass2()"/>
            <button class="eye-btn" id="eye2" onclick="togEye('pass2','eye2')">👁</button>
          </div>
          <div class="hint" id="pass2Hint"></div>
        </div>

        <button class="btn-primary" id="nextBtn1" onclick="next1()">Continue →</button>
      </div>

      <!-- ─── STEP 2: Profile ─── -->
      <div class="step" id="s2">
        <div class="step-label">Your Profile</div>

        <div class="field">
          <label class="field-label">Gender</label>
          <div class="gender-grid">
            <button class="gender-btn" id="gb-male" onclick="setGender('male',this)">
              <span class="g-icon">♂</span> Male
            </button>
            <button class="gender-btn" id="gb-female" onclick="setGender('female',this)">
              <span class="g-icon">♀</span> Female
            </button>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="age">Age</label>
          <input type="number" id="age" placeholder="Enter your age" min="1" max="120"/>
        </div>

        <div class="field">
          <label class="ck-row" for="termsChk">
            <input type="checkbox" id="termsChk"/>
            I agree to the <a href="terms.html" target="_blank">Terms of Service</a> &amp; <a href="privacy.html" target="_blank">Privacy Policy</a>
          </label>
        </div>

        <div class="btn-row">
          <button class="btn-secondary" onclick="goStep(1)">← Back</button>
          <button class="btn-primary" id="nextBtn2" onclick="next2()">Continue →</button>
        </div>
      </div>

      <!-- ─── STEP 3: Location & Interests ─── -->
      <div class="step" id="s3">
        <div class="step-label">Location &amp; Interests</div>

        <div class="field">
          <label class="field-label" for="country">Country <span style="font-weight:400;text-transform:none;color:var(--text-3)">(optional)</span></label>
          <select id="country" onchange="onCountry()"><option value="">Select country</option></select>
        </div>

        <div class="field">
          <label class="field-label" for="state">State / Province <span style="font-weight:400;text-transform:none;color:var(--text-3)">(optional)</span></label>
          <select id="state" disabled onchange="onState()"><option value="">Select country first</option></select>
        </div>

        <div class="field">
          <label class="field-label" for="city">City / District <span style="font-weight:400;text-transform:none;color:var(--text-3)">(optional)</span></label>
          <select id="city" disabled><option value="">Select state first</option></select>
        </div>

        <div class="field">
          <label class="field-label">
            Interests
            <span class="int-count-badge" id="intCnt">(0/8 selected)</span>
          </label>
          <div id="tagBox"></div>
        </div>

        <div class="btn-row">
          <button class="btn-secondary" onclick="goStep(2)">← Back</button>
          <button class="btn-primary" id="regBtn" onclick="doReg()">Create Account 🎉</button>
        </div>
      </div>

    </div><!-- /.card -->

/* ── Build Interest Tags ── */
function buildTagBox() {
  const box = document.getElementById('tagBox');
  box.innerHTML = '';
  Object.entries(INTEREST_CATS).forEach(([cat, tags]) => {
    const sec = document.createElement('div');
    sec.className = 'int-section';
    sec.innerHTML = `<div class="int-cat-label">${cat}</div>`;
    const row = document.createElement('div');
    row.className = 'tags';
    tags.forEach(tag => {
      const b = document.createElement('button');
      b.className = 'tag';
      b.textContent = tag;
      b.onclick = () => togTag(b, tag);
      row.appendChild(b);
    });
    sec.appendChild(row);
    box.appendChild(sec);
  });
}

function togTag(el, tag) {
  if (selInt.includes(tag)) {
    selInt = selInt.filter(i => i !== tag);
    el.classList.remove('selected');
  } else if (selInt.length < 8) {
    selInt.push(tag);
    el.classList.add('selected');
  }
  document.getElementById('intCnt').textContent = `(${selInt.length}/8 selected)`;
}

/* ── Validation ── */
let eT, uT;

function chkEmail() {
  const v = document.getElementById('email').value.trim();
  const h = document.getElementById('emailHint');
  const btn = document.getElementById('btnVerifyEmail');
  btn.disabled = true; // Default to disabled while typing or on invalid
  if (!v) { h.textContent = ''; h.className = 'hint'; return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
    h.textContent = 'Invalid email format'; h.className = 'hint err'; return;
  }
  clearTimeout(eT); h.textContent = 'Checking availability…'; h.className = 'hint inf';
  eT = setTimeout(async () => {
    try {
      const r = await fetch(`${API}/api/auth/check-email?email=${encodeURIComponent(v)}`);
      const d = await r.json();
      if (d.isDisposable) {
        h.textContent = 'Please use a permanent email address';
        h.className = 'hint err';
      } else {
        h.textContent = d.taken ? 'Email already taken' : '✓ Available';
        h.className = 'hint ' + (d.taken ? 'err' : 'ok');
        if (!d.taken && !d.isDisposable && !emailVerified) {
          btn.disabled = false; // Enable verify button since email is clean and available
        }
      }
    } catch { h.textContent = ''; h.className = 'hint'; }
  }, 600);
}

async function requestVerificationLink(e) {
  if (e) e.preventDefault();
  const emailInput = document.getElementById('email');
  const email = emailInput.value.trim();
  const btn = document.getElementById('btnVerifyEmail');
  const hint = document.getElementById('emailHint');
  
  btn.disabled = true;
  btn.textContent = 'Sending…';
  hint.textContent = 'Sending verification link…';
  hint.className = 'hint inf';
  
  try {
    const r = await fetch(`${API}/api/auth/send-verification-link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const d = await r.json();
    if (!r.ok) {
      hint.textContent = d.message || 'Failed to send link.';
      hint.className = 'hint err';
      btn.textContent = 'Verify';
      btn.disabled = false;
      return;
    }
    
    emailInput.disabled = true; // Lock the input so they can't change it during verification
    btn.textContent = 'Sent';
    hint.textContent = 'Verification link sent! Please check your email to verify...';
    hint.className = 'hint inf';
    
    // Start polling
    if (verificationInterval) clearInterval(verificationInterval);
    verificationInterval = setInterval(async () => {
      try {
        const statusRes = await fetch(`${API}/api/auth/check-verification?email=${encodeURIComponent(email)}`);
        const statusData = await statusRes.json();
        if (statusData.verified) {
          clearInterval(verificationInterval);
          emailVerified = true;
          hint.textContent = '✓ Email verified successfully! 🎉';
          hint.className = 'hint ok';
          btn.textContent = 'Verified';
          btn.disabled = true;
          btn.style.borderColor = 'var(--cyan)';
          btn.style.color = 'var(--cyan)';
          btn.style.background = 'rgba(34,211,238,0.08)';
        }
      } catch (pollErr) {
        console.error('Polling error:', pollErr);
      }
    }, 2500);
    
  } catch (err) {
    console.error(err);
    hint.textContent = 'Error connecting to server.';
    hint.className = 'hint err';
    btn.textContent = 'Verify';
    btn.disabled = false;
  }
}

/* ── Step Navigation ── */
function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('s' + n).classList.add('active');

  [1, 2, 3].forEach(i => {
    const dot = document.getElementById('pd' + i);
    const lbl = document.getElementById('pl' + i);
    dot.classList.remove('active', 'done');
    lbl.classList.remove('active');
    if (i < n) { dot.classList.add('done'); }
    else if (i === n) { dot.classList.add('active'); lbl.classList.add('active'); }
  });

  hideErr();
}

function showErr(msg) {
  const box = document.getElementById('errBox');
  document.getElementById('errText').textContent = msg;
  box.hidden = false;
}

function hideErr() {
  document.getElementById('errBox').hidden = true;
}

/* ── Step 1 Validation ── */
function next1() {
  const email = document.getElementById('email').value.trim();
  const uname = document.getElementById('uname').value.trim();
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  if (!email || !uname || !pass || !pass2) return showErr('All fields are required.');
  
  if (!emailVerified) {
    return showErr('Please verify your email address first.');
  }

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showErr('Enter a valid email address.');
  if (uname.length < 3) return showErr('Username must be at least 3 characters.');
  if (!/^[a-zA-Z0-9_]+$/.test(uname)) return showErr('Username can only contain letters, numbers, and underscores.');
  if (pass.length < 6) return showErr('Password must be at least 6 characters.');
  if (pass !== pass2) return showErr('Passwords do not match.');
  goStep(2);
}

/* ── Step 2 Validation ── */
function next2() {
  const age = parseInt(document.getElementById('age').value);
  if (!gender) return showErr('Please select your gender.');
  if (!age || age < 1) return showErr('Please enter a valid age.');
  if (!document.getElementById('termsChk').checked)
    return showErr('Please agree to the Terms of Service & Privacy Policy.');
  goStep(3);
}

/* ── Registration ── */
async function doReg() {
  const btn = document.getElementById('regBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account…';
  hideErr();

  const body = {
    email:    document.getElementById('email').value.trim(),
    password: document.getElementById('pass').value,
    username: document.getElementById('uname').value.trim(),
    gender,
    age:      parseInt(document.getElementById('age').value),
    country:  document.getElementById('country').value,
    state:    document.getElementById('state').value,
    city:     document.getElementById('city').value,
    interests: selInt,
    ageConfirmed: true,
  };

  try {
    const r = await fetch(`${API}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) { showErr(d.message || 'Registration failed. Please try again.'); return; }
    localStorage.removeItem('sc_guest');
    localStorage.setItem('sc_token', d.token);
    localStorage.setItem('sc_user', JSON.stringify(d.user));
    location.href = 'dashboard.html';
  } catch (e) {
    console.error(e);
    showErr('Cannot connect to server. Is the backend running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account 🎉';
  }
}

/* ── Canvas Particle Network ── */
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  const COLORS = ['rgba(124,92,252,', 'rgba(34,211,238,', 'rgba(244,114,182,'];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function mkParticle() {
    const c = COLORS[Math.floor(Math.random() * COLORS.length)];
    return { x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.6 + 0.4,
             dx: (Math.random() - 0.5) * 0.3, dy: (Math.random() - 0.5) * 0.3,
             o: Math.random() * 0.45 + 0.12, color: c };
  }

  function init() { resize(); particles = Array.from({ length: 55 }, mkParticle); }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = particles[i].color + (0.07 * (1 - d / 120)) + ')';
          ctx.lineWidth = 0.5; ctx.stroke();
        }
      }
    }
    particles.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > W) p.dx *= -1;
      if (p.y < 0 || p.y > H) p.dy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.o + ')'; ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init(); draw();
})();
